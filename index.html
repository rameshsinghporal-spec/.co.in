<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transport Department - Vehicle HSRP Solutions</title>
  <meta name="description" content="Official vehicle transport solutions and HSRP booking services." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --brand: #0d6efd;
      --brand2: #0aa2c0;
      --ink: #0b1220;
      --muted: #475569;
      --soft: #f5f7fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 10px 28px rgba(2, 6, 23, .08);
      --radius: 18px;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SITE CLOSED MESSAGE ── */
    .site-closed {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dc3545, #c82333);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
    }

    .closed-content {
      max-width: 900px;
      width: 100%;
    }

    .closed-content h1 {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 1.1;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
    }

    .closed-content p {
      font-size: clamp(1.25rem, 4vw, 1.8rem);
      font-weight: 600;
      margin: 0 0 2rem;
      opacity: 0.95;
    }

    .closed-content .small {
      font-size: clamp(1rem, 3vw, 1.3rem);
      opacity: 0.85;
    }

    /* Original nav styles (kept but hidden behind closed message) */
    .nav-glass {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1050;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      letter-spacing: .04em;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 10px 22px rgba(13, 110, 253, .25);
    }

    .navbar-brand {
      font-weight: 900;
      letter-spacing: .02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Rest of your original styles remain here unchanged */
    .pill-cta { border-radius: 999px; padding: .55rem 1rem; font-weight: 900; }
    .section { padding: 32px 0; }
    .section-title { font-weight: 950; letter-spacing: -.01em; margin: 0 0 8px; }
    .section-sub { color: var(--muted); font-weight: 650; margin: 0 0 24px; }
    .card-soft { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); height: 100%; }
    .icon-bubble { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg, rgba(13,110,253,.12), rgba(10,162,192,.12)); border: 1px solid rgba(13,110,253,.18); font-weight: 950; color: var(--ink); }
    .service-title { font-weight: 900; margin: 12px 0 6px; }
    .mini { color: var(--muted); font-weight: 650; margin: 0; }
    .quote { background: linear-gradient(90deg, rgba(13,110,253,.10), rgba(10,162,192,.10)); border: 1px solid rgba(13,110,253,.15); border-radius: 24px; padding: 24px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .footer { margin-top: auto; background: #0b1220; color: #fff; border-top-left-radius: 28px; border-top-right-radius: 28px; }
    .service-strip { background: linear-gradient(90deg, #0d6efd, #0aa2c0); border-radius: 22px; padding: 28px 22px; box-shadow: 0 18px 45px rgba(2,6,23,.10); overflow: hidden; margin-bottom: 30px; }
    .service-tile { border-radius: 18px; padding: 26px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(2,6,23,.08); box-shadow: 0 12px 28px rgba(2,6,23,.08); }
    .service-tile.light { background: #fde68a; }
    .service-tile.dark { background: #334b8a; color: #fff; border-color: rgba(255,255,255,.12); }
    .flag-section { display: flex; justify-content: center; margin: 24px 0 10px; }
    .flag-section img { width: 100%; max-width: 1200px; height: auto; border-radius: 2px; box-shadow: 0 18px 40px rgba(2,6,23,.15); object-fit: cover; }

    @media (max-width: 576px) {
      .flag-section img { height: auto; }
      .quote { justify-content: center; text-align: center; }
    }
  </style>
</head>

<body>

  <!-- SITE CLOSED MESSAGE – visible on all devices -->
  <div class="site-closed">
    <div class="closed-content">
      <h1>This Site Has Been Closed</h1>
      <p>Services are no longer available.</p>
      <p class="small">Thank you for your understanding.</p>
    </div>
  </div>

  <!-- Original content (hidden behind the closed message) -->
  <nav class="navbar navbar-expand-lg navbar-light nav-glass">
    <div class="container">
      <a class="navbar-brand" href="#">
        <span class="brand-badge">IN</span>
        <span>Transport Department</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 mt-3 mt-lg-0">
          <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="#">How it works</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-primary pill-cta" href="#">Get a Quote</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="flag-section">
    <img src="images/advertisement_Test.jpg" alt="advertisement">
  </section>

  <div class="container mt-4">
    <div class="service-strip">
      <div class="row g-3">
        <div class="col-lg-4 col-md-6">
          <div class="service-tile light">
            <h3>Two Wheeler</h3>
            <a href="#" class="btn btn-outline-dark">Book →</a>
          </div>
        </div>
        <div class="col-lg-4 col-md-6">
          <div class="service-tile dark">
            <h3>Replacement / Retain / Transfer</h3>
            <a href="#" class="btn btn-outline-light">Book →</a>
          </div>
        </div>
        <div class="col-lg-4 col-md-6">
          <div class="service-tile light">
            <h3>Four Wheeler</h3>
            <a href="#" class="btn btn-outline-dark">Book →</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- The rest of your original sections can stay here if you want to keep the code intact -->
  <!-- ... How it works, Details, Footer, etc. ... -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

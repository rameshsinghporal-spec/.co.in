<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Payment - Transport Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

<style>
body {
  background:#f5f7fb;
  font-family:system-ui;
  padding:20px;
}

.payment-container {
  max-width:500px;
  margin:auto;
}

.card-payment {
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.qr-frame {
  display:flex;
  justify-content:center;
}

.qr-frame img {
  width:100%;
  max-width:220px;
  height:auto;
  object-fit:contain;
  border-radius:10px;
}

@media (max-width:576px){
  .card-payment { padding:15px; }
}

.btn-submit {
  background:#198754;
  color:#fff;
  font-weight:700;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container payment-container">

<h4 class="text-center mb-3">Payment</h4>

<div class="card-payment">

<p><b>Vehicle Type:</b> <span id="vehicleTypeText"></span></p>
<p><b>Total Amount:</b> <span id="priceText"></span></p>

<div class="qr-frame mb-3">
  <img id="qrImg" src="images/1099.jpeg">
</div>

<form id="paymentForm">

<div class="mb-3">
<label>Transaction ID (UTR)*</label>
<input type="text" id="utr" class="form-control" required>
</div>

<div class="mb-3">
<label>Upload Screenshot*</label>
<input type="file" id="file" class="form-control" accept="image/*" required>
</div>

<button type="submit" class="btn-submit">Submit Payment</button>

</form>

</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get('type') || 'Two Wheeler';

const config = {
'Colour Sticker': { img:'images/1199.png', price:'₹1199' },
'Two Wheeler': { img:'images/1099.png', price:'₹1099' },
'Three Wheeler': { img:'images/1299.png', price:'₹1299' },
'Electric Vehicle': { img:'images/1299.png', price:'₹1299' },
'Tractor & Trailer': { img:'images/1399.png', price:'₹1399' },
'Four Wheeler': { img:'images/1499.png', price:'₹1499' },
'Heavy Vehicle': { img:'images/1499.png', price:'₹1499' },
'Replacement': { img:'images/1199.png', price:'₹1199' }
};

const settings = config[type] || config['Two Wheeler'];

document.getElementById('qrImg').src = settings.img;
document.getElementById('priceText').innerText = settings.price;
document.getElementById('vehicleTypeText').innerText = type;

document.getElementById("paymentForm").addEventListener("submit", function(e){
e.preventDefault();

const utr = document.getElementById("utr").value.trim();
const file = document.getElementById("file").files.length;

if(utr === "" || file === 0){
alert("Please enter UTR ID and upload screenshot");
return;
}

// 🔥 FIX: amount bhi pass hoga
const amount = document.getElementById('priceText').innerText;

window.location.href = "success.html?type="
+ encodeURIComponent(type)
+ "&amount=" + encodeURIComponent(amount);

});
</script>

</body>
</html>

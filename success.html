<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Success</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fb; font-family:Arial;">

<div class="container mt-5">
  <div class="card p-4 shadow">

    <h2 style="color:green;">✅ Payment Successful</h2>
    <p>Status: <b style="color:green;">CONFIRMED</b></p>

    <p>
      Your order has been successfully placed.<br>
      You will receive your HSRP within <b>7–10 working days</b>.
    </p>

    <hr>

    <h4>Order Details</h4>

    <p><b>Order ID:</b> <span id="orderId"></span></p>
    <p><b>Service:</b> <span id="serviceType"></span></p>

    <p><b>Amount Paid:</b> <span id="amount" style="color:green;font-weight:bold;"></span></p>

    <p><b>Payment Time:</b> <span id="time"></span></p>

    <p style="color:green;">
      Estimated Delivery: 7–10 Working Days
    </p>

    <a href="index.html" class="btn btn-primary">Back to Home</a>

  </div>
</div>

<script>
// order id
document.getElementById("orderId").innerText =
"HSRP-" + Math.floor(Math.random()*100000);

// URL params
const params = new URLSearchParams(window.location.search);

// service type
document.getElementById("serviceType").innerText =
params.get("type") || "HSRP Service";

// amount (🔥 FIXED)
document.getElementById("amount").innerText =
params.get("amount") || "₹0";

// time
document.getElementById("time").innerText =
new Date().toLocaleString();
</script>

</body>
</html>
